<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        /* Basic styling */
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        #chatBox { border: 1px solid #ccc; background: #fff; padding: 10px; height: 400px; overflow-y: auto; margin-bottom: 10px; }
        .message { padding: 5px 10px; margin: 5px 0; border-radius: 10px; max-width: 70%; }
        .user-message { background: #0084ff; color: #fff; margin-left: auto; text-align: right; }
        .bot-message { background: #e5e5ea; color: #000; margin-right: auto; text-align: left; }
        #userInput { width: 80%; padding: 10px; }
        #sendBtn { padding: 10px; }
    </style>
</head>
<body>
    <h1>AI Chat</h1>
    <div id="chatBox"></div>
    <input id="userInput" type="text" placeholder="Type a message">
    <button id="sendBtn">Send</button>

    <script src="script.js"></script>
</body>
</html>
