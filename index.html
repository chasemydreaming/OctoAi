<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoAI Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
        #logo { font-size: 2em; font-weight: bold; color: #0084ff; margin-bottom: 10px; }
        h1 { margin-top: 0; }
        #chatBox { border: 1px solid #ccc; background: #fff; padding: 10px; height: 400px; overflow-y: auto; margin-bottom: 10px; border-radius: 10px; }
        .message { padding: 8px 12px; margin: 5px 0; border-radius: 12px; max-width: 70%; word-wrap: break-word; }
        .user-message { background: #0084ff; color: #fff; margin-left: auto; text-align: right; }
        .bot-message { background: #e5e5ea; color: #000; margin-right: auto; text-align: left; }
        #userInput { width: 75%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        #sendBtn { padding: 10px 15px; border-radius: 8px; border: none; background: #0084ff; color: #fff; cursor: pointer; }
        #sendBtn:hover { background: #006fcc; }
    </style>
</head>
<body>
    <div id="logo">OctoAI</div>
    <h1>Welcome to OctoAI Chat</h1>

    <div id="chatBox"></div>

    <input id="userInput" type="text" placeholder="Type a message">
    <button id="sendBtn">Send</button>

    <script>
        // Grab elements
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatBox = document.getElementById('chatBox');

        // Add a message to chat
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;

            const messageText = document.createElement('p');
            messageText.textContent = text;

            messageDiv.appendChild(messageText);
            chatBox.appendChild(messageDiv);

            // Smooth scroll
            messageDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // Send message and get AI response
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user'); // Show user message
            userInput.value = '';

            const typingMessage = "AI is thinking...";
            addMessage(typingMessage, 'bot'); // typing indicator

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 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 // <-- put your key here
                    },
                    body: JSON.stringify({
                        model: "gpt-4",
                        messages: [{ role: "user", content: message }]
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;

                // Replace typing indicator with actual AI response
                chatBox.lastChild.querySelector('p').textContent = aiText;

            } catch (err) {
                chatBox.lastChild.querySelector('p').textContent = "Oops! Something went wrong.";
                console.error(err);
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        // Press Enter to send, Shift+Enter for newline
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
